        </div>
    </div>

    <script>
        const words = [
            "Zelpware",
            "Welcome to Zelpware",
            "The Best PvP Tool"
        ];

        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        const textTarget = document.getElementById("text-target");

        function typeEffect() {
            const currentWord = words[wordIndex];

            if (isDeleting) {
                textTarget.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textTarget.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            let typingSpeed = isDeleting ? 40 : 80;

            if (!isDeleting && charIndex === currentWord.length) {
                typingSpeed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typingSpeed = 400;
            }

            setTimeout(typeEffect, typingSpeed);
        }

        function copyCode() {
            const codeText = document.getElementById("macro-code").innerText;
            navigator.clipboard.writeText(codeText);
        }

        function copyDiscordLink() {
            const discordLink = "https://discord.gg/mcZ5xYac4X";

            navigator.clipboard.writeText(discordLink).then(() => {
                const overlay = document.getElementById("toast-overlay");
                overlay.classList.add("active");

                setTimeout(() => {
                    overlay.classList.remove("active");
                }, 2000);
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(typeEffect, 300);
        });
    </script>
</body>
</html>
